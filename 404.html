<script type="text/javascript">
    var path = window.location.pathname.toLowerCase();
    var host = "https://foro.foroopositores.com"; // <--- Tu subdominio del foro
    var principal = "https://temarios.github.io"; // <--- Tu web de GitHub

    // 1. Si la URL antigua contenía palabras clave del foro (ej: 'viewtopic', 'forum', 'post')
    if (path.includes('forum') || path.includes('topic') || path.includes('phpbb')) {
        window.location.replace(host); 
    } 
    // 2. Si es cualquier otra cosa, mándalo al inicio de la nueva web de GitHub
    else {
        window.location.replace(principal);
    }
</script>
